global:
  scrape_interval: 15s 

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093" 

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "fail2ban"
    static_configs:
      - targets: ["fail2ban-exporter:9121"] 