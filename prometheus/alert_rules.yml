groups:
  - name: fail2ban_alerts
    rules:
      - alert: IpBaneadaDetectada
        expr: fail2ban_banned_ips > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "IP Bloqueada por Fail2ban"
          description: "Se ha detectado una o más IP/s baneadas en el sistema de seguridad."

      - alert: Fail2banCaido
        expr: fail2ban_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Fail2ban está caído"
          description: "El servicio fail2ban no responde hace más de 1 minuto."

      - alert: AtaqueMasivo
        expr: fail2ban_banned_ips > 10
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Ataque masivo detectado"
          description: "Más de 10 IPs baneadas simultáneamente en la jail {{ $labels.jail }}."