input {
  http {
    port => 8081
    codec => "json"
  }
}

filter {
  # Agregar timestamp si no existe
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }
  
  # Convertir timestamp
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
  
  # Determinar índice destino basado en 'type'
  if [type] == "ip_block_event" {
    mutate {
      add_tag => ["ip_block", "workflow4"]
    }
  }
  else if [type] == "ticket_created" {
    mutate {
      add_tag => ["ticket", "workflow5"]
    }
  }
  else {
    mutate {
      add_tag => ["alert", "workflow3"]
    }
  }
  
  # Limpieza básica
  mutate {
    remove_field => ["headers", "host", "@version", "http"]
  }
}

output {
  # Depuración en consola
  stdout {
    codec => rubydebug
  }
  
  # Enviar a Elasticsearch con índice específico
  if [type] == "ip_block_event" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "ip-blocks"
    }
  }
  else if [type] == "ticket_created" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "security-tickets"
    }
  }
  else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "n8n-alerts"
    }
  }
}