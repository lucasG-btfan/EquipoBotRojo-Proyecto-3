host: 0.0.0.0
port: 55000
drop_privileges: yes
experimental_features: no
max_upload_size: 10485760
intervals:
  request_timeout: 10
https:
  enabled: no
logs:
  level: info
  format: plain
cors:
  enabled: no
  source_route: "*"
  expose_headers: "*"
  allow_headers: "*"
  allow_credentials: no
cache:
  enabled: yes
  time: 0.750
access:
  max_login_attempts: 5
  block_time: 300
  max_request_per_minute: 300
use_only_authd: no
