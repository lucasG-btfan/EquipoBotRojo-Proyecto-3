<agent_config>
  <!-- Configuración base para agentes -->
  <syscheck>
    <disabled>no</disabled>
    
    <!-- Directorios a monitorear en Linux/Unix -->
    <directories check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
    <directories check_all="yes">/bin,/sbin,/boot</directories>
    
    <!-- Directorios a monitorear en Windows (si aplica) -->
    <directories check_all="yes">C:\windows\system32</directories>
    
    <!-- Ignorar archivos temporales -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    
    <!-- Frecuencia de escaneo (en segundos) -->
    <frequency>7200</frequency>
    
    <!-- Alertas de cambios -->
    <alert_new_files>yes</alert_new_files>
    
    <!-- Auto-ignore de archivos que cambian frecuentemente -->
    <auto_ignore>yes</auto_ignore>
  </syscheck>

  <!-- Rootcheck (detección de rootkits) -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    
    <!-- Bases de datos de rootkits -->
    <rootkit_files>/var/ossec/etc/shared/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>/var/ossec/etc/shared/rootkit_trojans.txt</rootkit_trojans>
  </rootcheck>

  <!-- Active response (opcional) -->
  <active-response>
    <disabled>yes</disabled>
  </active-response>

  <!-- Localfile: logs a monitorear -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/messages</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/secure</location>
  </localfile>
</agent_config>