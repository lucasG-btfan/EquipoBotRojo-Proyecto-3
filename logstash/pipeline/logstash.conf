input {
  http {
    port => 8080
    codec => json
  }
  file {
    path => "/var/log/security/*.log"
    start_position => "beginning"
    type => "syslog"
    codec => "json"
  }
}

filter {
  if [event][original] {
    json {
      source => "[event][original]"
      target => "parsed"
    }
    mutate {
      copy => { 
        "[parsed][message]" => "message"
        "[parsed][severity]" => "severity"
        "[parsed][source_ip]" => "source_ip"
        "[parsed][type]" => "type"
        "[parsed][timestamp]" => "timestamp"
      }
      remove_field => ["parsed", "event"]
    }
  }
  if [source_ip] {
    geoip {
      source => "source_ip"
      target => "geoip"
    }
  }

  if [severity] == "critical" {
    mutate { add_field => { "threat_score" => 100 } }
  } else if [severity] == "high" {
    mutate { add_field => { "threat_score" => 75 } }
  } else {
    mutate { add_field => { "threat_score" => 25 } }
  }

  mutate {
    remove_field => ["headers", "host", "@version", "http"]
  }
}

output {
  if [type] == "ip_block_event" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "ip-blocks-%{+YYYY.MM.dd}"
    }
  } else if [type] == "ticket_created" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "security-tickets-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "security-logs-%{+YYYY.MM.dd}"
    }
  }
  stdout { codec => rubydebug }
}