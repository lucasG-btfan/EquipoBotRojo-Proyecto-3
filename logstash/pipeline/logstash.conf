input {
  http {
    port => 8080
    codec => json
    response_headers => {
      "Access-Control-Allow-Origin" => "*"
      "Content-Type" => "text/plain"
    }
  }
  http {
    port => 8081
    codec => json
    response_headers => {
      "Access-Control-Allow-Origin" => "*"
      "Content-Type" => "text/plain"
    }
  }
}
filter {
  # Si el evento viene dentro de "event.original", extraerlo
  if [event][original] {
    json {
      source => "[event][original]"
      target => "parsed"
      remove_field => ["event"]
    }
    
    # Mover los campos parseados a la raíz
    mutate {
      copy => { 
        "[parsed][message]" => "message"
        "[parsed][severity]" => "severity"
        "[parsed][rule_name]" => "rule_name"
        "[parsed][source_ip]" => "source_ip"
        "[parsed][description]" => "description"
        "[parsed][category]" => "category"
        "[parsed][event_count]" => "event_count"
        "[parsed][data_source]" => "data_source"
        "[parsed][timestamp]" => "timestamp"
      }
      remove_field => ["parsed"]
    }
  } else {
    # Si no viene en event.original, los campos ya están en la raíz
    # No necesitamos hacer nada especial
  }

  # Parsear timestamp
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

# Calcular threat_score solo si no viene ya en el payload
  if [severity] and ![threat_score] {
    if [severity] == "critical" {
      mutate { add_field => { "threat_score" => 100 } }
    } else if [severity] == "high" {
      mutate { add_field => { "threat_score" => 75 } }
    } else if [severity] == "medium" {
      mutate { add_field => { "threat_score" => 50 } }
    } else if [severity] == "low" {
      mutate { add_field => { "threat_score" => 25 } }
    } else if [severity] == "warning" {
      mutate { add_field => { "threat_score" => 30 } }
    } else if [severity] == "info" {
      mutate { add_field => { "threat_score" => 10 } }
    } else {
      mutate { add_field => { "threat_score" => 0 } }
    }
  }

  # Limpiar campos de metadata
  mutate {
    remove_field => ["headers", "host", "@version", "http", "url", "user_agent"]
  }
}

output {
  if [data_source] == "n8n_workflow" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "n8n-alerts-%{+YYYY.MM.dd}"
    }
  } else if [type] == "ticket_created" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "security-tickets"
    }
  } else if [type] == "ip_block_event" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "ip-blocks"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "security-logs-%{+YYYY.MM.dd}"
    }
  }

  stdout { codec => rubydebug }
}
